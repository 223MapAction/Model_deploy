name: CI/CD Pipeline

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

permissions:
    contents: write
    pages: write
    id-token: write

env:
    AWS_REGION: eu-west-3 # Change to your AWS region
    DOCKER_BUILDKIT: 1

jobs:
    setup-and-test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.10"

            - name: Set up Docker
              uses: docker/setup-buildx-action@v3

            - name: Free up disk space
              run: |
                  # Remove unnecessary large packages
                  sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
                  sudo apt-get clean
                  sudo docker system prune -af
                  sudo docker volume prune -f
                  # Clear pip cache
                  rm -rf ~/.cache/pip
                  # Display available disk space
                  df -h

            - name: Install Docker Compose
              run: |
                  COMPOSE_VERSION=v2.24.5
                  sudo curl -L "https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
                  sudo chmod +x /usr/local/bin/docker-compose
                  docker-compose --version

            - name: Create .cv_deploy.env
              run: |
                  echo "MODEL_PATH=${{ secrets.MODEL_PATH }}" >> .cv_deploy.env
                  echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .cv_deploy.env
                  echo "REDIS_URL=${{ secrets.REDIS_URL }}" >> .cv_deploy.env
                  echo "REDIS_HOST=${{ secrets.REDIS_HOST }}" >> .cv_deploy.env
                  echo "REDIS_PORT=${{ secrets.REDIS_PORT }}" >> .cv_deploy.env
                  echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> .cv_deploy.env
                  echo "POSTGRES_URL=${{ secrets.POSTGRES_URL }}" >> .cv_deploy.env
                  echo "GEE_SERVICE_ACCOUNT_EMAIL=${{ secrets.GEE_SERVICE_ACCOUNT_EMAIL }}" >> .cv_deploy.env
                  echo "GEE_SERVICE_ACCOUNT_KEY_FILE=${{ secrets.GEE_SERVICE_ACCOUNT_KEY_FILE}}" >> .cv_deploy.env
                  echo "BLOB_ACCOUNT_URL=${{ secrets.BLOB_ACCOUNT_URL }}" >> .cv_deploy.env
                  echo "BLOB_CONTAINER_NAME=${{ secrets.BLOB_CONTAINER_NAME }}" >> .cv_deploy.env
                  echo "SERVER_URL=${{ secrets.SERVER_URL }}" >> .cv_deploy.env
                  echo "BLOB_SAS_TOKEN=${{ secrets.BLOB_SAS_TOKEN }}" >> .cv_deploy.env
                  echo "SKIP_GEE_INIT=true" >> .cv_deploy.env
              shell: bash

            - name: Create coverage directory
              run: mkdir -p coverage

            - name: Run Tests
              run: |
                  # Set Docker pip environment variables to reduce cache usage
                  export DOCKER_BUILDKIT=1
                  export PIP_NO_CACHE_DIR=1
                  export DOCKER_DEFAULT_PLATFORM=linux/amd64

                  docker-compose -f _ci_pipeline.yml up --build -d
                  docker-compose -f _ci_pipeline.yml run --rm -v ${{ github.workspace }}/coverage:/app/coverage testing

            - name: Check for coverage file
              run: |
                  if [ ! -f ./coverage/coverage.xml ]; then
                    echo "Coverage file not found!"
                    exit 1
                  fi

            - name: Upload coverage reports to Codecov
              uses: codecov/codecov-action@v4
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
              with:
                  files: ./coverage/coverage.xml

            - name: Tear down testing environment
              if: always() # Ensure this runs even if previous steps fail
              run: |
                  docker-compose -f _ci_pipeline.yml down --volumes --remove-orphans

            - name: Prune Docker resources (testing)
              if: always() # Ensure this runs even if previous steps fail
              run: |
                  docker system prune -af

    deploy:
        needs: [setup-and-test]
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v2
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Set environment variables in AWS App Runner
              run: |
                  # Create a JSON file with environment variables
                  cat > env-vars.json << EOF
                  {
                    "Variables": {
                      "MODEL_PATH": "${{ secrets.MODEL_PATH }}",
                      "OPENAI_API_KEY": "${{ secrets.OPENAI_API_KEY }}",
                      "REDIS_URL": "${{ secrets.REDIS_URL }}",
                      "REDIS_HOST": "${{ secrets.REDIS_HOST }}",
                      "REDIS_PORT": "${{ secrets.REDIS_PORT }}",
                      "REDIS_PASSWORD": "${{ secrets.REDIS_PASSWORD }}",
                      "POSTGRES_URL": "${{ secrets.POSTGRES_URL }}",
                      "GEE_SERVICE_ACCOUNT_EMAIL": "${{ secrets.GEE_SERVICE_ACCOUNT_EMAIL }}",
                      "GEE_SERVICE_ACCOUNT_KEY_FILE": "${{ secrets.GEE_SERVICE_ACCOUNT_KEY_FILE }}",
                      "BLOB_ACCOUNT_URL": "${{ secrets.BLOB_ACCOUNT_URL }}",
                      "BLOB_CONTAINER_NAME": "${{ secrets.BLOB_CONTAINER_NAME }}",
                      "SERVER_URL": "${{ secrets.SERVER_URL }}",
                      "BLOB_SAS_TOKEN": "${{ secrets.BLOB_SAS_TOKEN }}"
                    }
                  }
                  EOF

            - name: Deploy to AWS App Runner
              run: |
                  # Get service ID (assuming you've already created the service)
                  SERVICE_ID=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='map-action-api'].ServiceId" --output text)

                  if [ -z "$SERVICE_ID" ]; then
                    echo "Creating new App Runner service..."
                    # Create a new service if it doesn't exist
                    aws apprunner create-service \
                      --service-name map-action-api \
                      --source-configuration '{"AuthenticationConfiguration":{"ConnectionArn":"${{ secrets.AWS_CONNECTION_ARN }}"},"AutoDeploymentsEnabled":false,"CodeRepository":{"RepositoryUrl":"${{ github.repository }}","SourceCodeVersion":{"Type":"BRANCH","Value":"main"},"CodeConfiguration":{"ConfigurationSource":"REPOSITORY"}}}' \
                      --instance-configuration '{"Cpu":"1 vCPU","Memory":"2 GB"}' \
                      --environment-variables file://env-vars.json
                  else
                    echo "Updating existing App Runner service..."
                    # Start a new deployment if the service exists
                    aws apprunner start-deployment \
                      --service-id $SERVICE_ID
                  fi

                  echo "Deployment initiated successfully."
